name: Daily Question Generator

on:
  schedule:
    # Runs every day at 12:00 AM IST (6:30 PM UTC previous day)
    - cron: '30 18 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate daily questions for all exams
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_KEY_UPSC: ${{ secrets.GEMINI_KEY_UPSC }}
          GEMINI_KEY_OAS: ${{ secrets.GEMINI_KEY_OAS }}
          GEMINI_KEY_OSSC: ${{ secrets.GEMINI_KEY_OSSC }}
          GEMINI_KEY_CGL: ${{ secrets.GEMINI_KEY_CGL }}
          GEMINI_KEY_CHSL: ${{ secrets.GEMINI_KEY_CHSL }}
          GEMINI_KEY_SGL: ${{ secrets.GEMINI_KEY_SGL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/generate-questions.js

      - name: Commit and push new questions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add questions/
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No new questions to commit"
          else
            TODAY=$(date -u +%Y-%m-%d)
            git commit -m "Daily questions update: ${TODAY}"
            git push
          fi
